name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Cancel superseded runs on the same ref so a burst of pushes doesn't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel (stable) and the rustfmt + clippy
      # components; this installs exactly that.
      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      # The gates the workspace is kept clean under. The Tauri desktop app is a
      # separate workspace (excluded here) so CI stays fast and needs no webview
      # toolchain — matching the project's split.
      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets

      - name: Tests
        run: cargo test --workspace

      - name: Docs (deny broken intra-doc links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
