name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Cancel superseded runs on the same ref so a burst of pushes doesn't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel (stable) and the rustfmt + clippy
      # components; this installs exactly that.
      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      # The gates the workspace is kept clean under. The Tauri desktop app is a
      # separate workspace (excluded here) so CI stays fast and needs no webview
      # toolchain — matching the project's split.
      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets

      - name: Tests
        run: cargo test --workspace

      - name: Docs (deny broken intra-doc links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  # The React frontend: typecheck + component tests. Pure Node — no webview
  # toolchain needed, so this stays fast.
  frontend:
    name: app · tsc · vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      # The app is a pnpm project (app/pnpm-lock.yaml is the tracked lockfile).
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

  # The Tauri bridge: its own Cargo workspace (excluded from the root one), so
  # the core job never sees it break. Needs the webview system libraries.
  bridge:
    name: app · clippy (Tauri bridge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Webview system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path app/src-tauri/Cargo.toml --all-targets
